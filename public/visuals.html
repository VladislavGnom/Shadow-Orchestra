<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Теневой оркестр — Визуализация</title>
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; }
</style>
</head>
<body>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

<script>
  // ═══════════════════════════════════════════════════
  // Цвета ролей синтезатора (HUE в HSB)
  // ═══════════════════════════════════════════════════
  const ROLE_HUE = { bass: 0, pad: 180, lead: 50, arp: 260, fx: 330 };

  // Цвета ролей ремикса — та же палитра, что в player.html/conductor.html
  const REMIX_ROLE_HUE = { filter: 200, reverb: 280, delay: 320, pitch: 40, distortion: 0 };

  // Диапазоны реальных значений effect-change для каждой remix-роли (см. player.html,
  // handleRemixMotion) — нужны, чтобы превратить "сырое" value в activity 0..1 для
  // размера точки/частиц/колец, точно так же, как раньше это делала velocity.
  const REMIX_VALUE_RANGE = {
    filter: [200, 8000],   // Hz
    reverb: [0, 1],        // roomSize
    delay: [0, 0.8],       // feedback
    pitch: [-12, 12],      // полутоны — 0 полутонов даёт activity 0.5, это ок:
                            // "по центру" — не значит "молчит", просто нейтрально
    distortion: [0, 1]     // amount
  };

  function normalizeRemixValue(role, value) {
    const range = REMIX_VALUE_RANGE[role];
    if (!range) return 0;
    const [lo, hi] = range;
    return constrain((value - lo) / (hi - lo), 0, 1);
  }

  // ═══════════════════════════════════════════════════
  // ИСПРАВЛЕНИЕ БАГА: раньше drawOrbits проверял только player.note === null,
  // из-за чего remix-игроки (у которых note всегда null, они управляют не нотами,
  // а параметрами эффекта через value) полностью пропадали из визуализации — их
  // не рисовали ни как орбиты (note === null → return), ни как что-то ещё
  // (playMode === 'remix' раньше вообще не проверялся на уровне отдельного
  // инструмента, только глобально).
  //
  // getPlayerVisual() — единая точка входа: по инструменту отдаёт { hue, activity }
  // независимо от того, synth это или remix, либо null, если инструмент ещё не
  // прислал ни одного значения (нота/эффект). Дальше вся орбитально-частичная
  // система (drawOrbits/drawPlayerDot/drawRings/spawnParticle) работает только
  // с этой парой и знать не знает про роли/note/value.
  // ═══════════════════════════════════════════════════
  function getPlayerVisual(player) {
    if (!player) return null;

    if (player.playMode === 'remix') {
      if (player.value === null || player.value === undefined) return null; // ещё не крутил телефон
      return {
        hue: REMIX_ROLE_HUE[player.role] ?? 200,
        activity: normalizeRemixValue(player.role, player.value)
      };
    }

    // synth (или неизвестный playMode — считаем synth для обратной совместимости)
    if (player.note === null || player.note === undefined) return null;
    return {
      hue: ROLE_HUE[player.role] ?? 0,
      activity: player.velocity ?? 0
    };
  }

  // ═══════════════════════════════════════════════════
  // Состояние, приходящее с сервера
  // ═══════════════════════════════════════════════════
  let instruments = {};
  let bpm = 120;
  let mode = 'ambient';       // ambient | beat | chaos — визуальный режим
  let playMode = 'synth';     // synth | remix — глобальный режим исполнения (для фона-спектра)

  let latestSpectrumBins = new Array(32).fill(0);

  // ═══════════════════════════════════════════════════
  // Локальное состояние визуализации
  // ═══════════════════════════════════════════════════
  let waveOffset = 0;
  let particles = [];
  const MAX_PARTICLES = 300;

  // ═══════════════════════════════════════════════════
  // Socket.IO
  // ═══════════════════════════════════════════════════
  const socket = io();

  socket.on('connect', () => {
    socket.emit('register', { type: 'visuals' });
  });

  socket.on('visualization-data', (data) => {
    instruments = data.instruments || {};
    bpm = data.bpm || bpm;
    mode = data.mode || mode;
    playMode = data.playMode || playMode;
  });

  // Приходит только пока хост (conductor.html) реально играет трек в remix-режиме
  socket.on('spectrum-data', ({ bins }) => {
    if (Array.isArray(bins)) latestSpectrumBins = bins;
  });

  // ═══════════════════════════════════════════════════
  // p5.js — базовая сцена
  // ═══════════════════════════════════════════════════
  function setup() {
    createCanvas(windowWidth, windowHeight);
    colorMode(HSB, 360, 100, 100, 100);
    noStroke();
  }

  function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
  }

  function draw() {
    background(0, 0, 0, 15);
    waveOffset += 0.01 * (bpm / 120);

    const isChaos = mode === 'chaos';
    if (isChaos) {
      push();
      translate(random(-10, 10), random(-10, 10));
    }

    drawMetronome();

    // Спектр трека — фон, показывается только пока идёт Ремикс (данные приходят
    // от хоста, только когда там реально играет Tone.Player). Рисуется ПОД
    // орбитами игроков, а не вместо них — см. фикс выше.
    if (playMode === 'remix') {
      drawSpectrum(latestSpectrumBins, getDominantEffectHue());
    }

    const playerIds = Object.keys(instruments);
    if (playerIds.length === 0) {
      drawIdleState();
    } else {
      drawOrbits(playerIds);
    }
    updateAndDrawParticles();

    if (isChaos) {
      pop();
    }
  }

  // ═══════════════════════════════════════════════════
  // Метроном — рисуется в обоих playMode
  // ═══════════════════════════════════════════════════
  function drawMetronome() {
    const beatPhase = (frameCount * (bpm / 60) / 60); // допущение: 60 fps
    const pulse = sin(beatPhase * TWO_PI);
    const size = 100 + pulse * 50;

    fill(0, 0, 100, 10);
    ellipse(width / 2, height / 2, size, size);
  }

  // ═══════════════════════════════════════════════════
  // REMIX: фоновый спектр-анализатор трека
  // ═══════════════════════════════════════════════════

  /**
   * Средний "цвет" сцены — векторное усреднение HUE активных remix-эффектов
   * (векторное, чтобы избежать некорректного усреднения через 0°/360°).
   * Возвращает 200 (голубой) по умолчанию, если ремикс-игроков ещё нет.
   */
  function getDominantEffectHue() {
    let sumX = 0, sumY = 0, count = 0;

    for (const id of Object.keys(instruments)) {
      const inst = instruments[id];
      if (!inst || inst.playMode !== 'remix' || inst.value === null || inst.value === undefined) continue;

      const hue = REMIX_ROLE_HUE[inst.role] ?? 200;
      const rad = hue * (Math.PI / 180);
      sumX += cos(rad);
      sumY += sin(rad);
      count++;
    }

    if (count === 0) return 200;

    let angle = atan2(sumY, sumX) * (180 / Math.PI);
    if (angle < 0) angle += 360;
    return angle;
  }

  function drawSpectrum(bins, hue) {
    if (!bins || bins.length === 0) return;

    const barCount = bins.length;
    const barWidth = width / barCount;

    for (let i = 0; i < barCount; i++) {
      const value = constrain(bins[i] / 255, 0, 1);
      const barHeight = value * height * 0.6;

      fill(hue, 70, 50 + value * 45, 75);
      rect(i * barWidth, height - barHeight, barWidth * 0.8, barHeight);

      // Лёгкое зеркальное отражение сверху для симметрии сцены
      fill(hue, 70, 50 + value * 45, 25);
      rect(i * barWidth, 0, barWidth * 0.8, barHeight * 0.3);
    }
  }

  // ═══════════════════════════════════════════════════
  // Пустой оркестр — система жива и ждёт (общий для обоих playMode)
  // ═══════════════════════════════════════════════════
  function drawIdleState() {
    const pulse = sin(frameCount * 0.03);
    const size = 30 + pulse * 15;
    fill(0, 0, 100, 5 + abs(pulse) * 5);
    ellipse(width / 2, height / 2, size, size);
  }

  // ═══════════════════════════════════════════════════
  // Орбиты игроков — работает и для synth (note/velocity), и для remix
  // (value), через единый getPlayerVisual(). Инструмент без активности
  // (ещё не прислал ни ноты, ни effect-change) просто пропускается —
  // не рисуется вообще, как и раньше для synth.
  // ═══════════════════════════════════════════════════
  function drawOrbits(playerIds) {
    const total = playerIds.length;
    const orbitRadius = min(width, height) * 0.3;

    playerIds.forEach((id, index) => {
      const player = instruments[id];
      const visual = getPlayerVisual(player);
      if (!visual) return;

      const angle = (index / total) * TWO_PI + waveOffset;
      const x = width / 2 + cos(angle) * orbitRadius;
      const y = height / 2 + sin(angle) * orbitRadius;

      drawPlayerDot(x, y, visual.hue, visual.activity);

      if (visual.activity > 0.3 && frameCount % 3 === 0) {
        spawnParticle(x, y, visual.hue);
      }
      if (visual.activity > 0.5) {
        drawRings(x, y, visual.hue);
      }
    });
  }

  function drawPlayerDot(x, y, hue, activity) {
    const size = 20 + activity * 80;

    fill(hue, 60, 100, 8);
    ellipse(x, y, size * 2, size * 2);
    fill(hue, 60, 100, 6);
    ellipse(x, y, size * 3, size * 3);
    fill(hue, 60, 100, 5);
    ellipse(x, y, size * 4, size * 4);
    fill(hue, 60, 100, 80);
    ellipse(x, y, size, size);
  }

  function drawRings(x, y, hue) {
    noFill();
    strokeWeight(1);
    for (let ringIndex = 0; ringIndex < 3; ringIndex++) {
      const radius = 30 + ringIndex * 30 + sin(frameCount * 0.1 + ringIndex) * 20;
      stroke(hue, 60, 80, 30 - ringIndex * 10);
      ellipse(x, y, radius * 2, radius * 2);
    }
    noStroke();
  }

  function spawnParticle(x, y, hue) {
    if (particles.length >= MAX_PARTICLES) return;
    particles.push({
      x, y,
      vx: random(-3, 3),
      vy: random(-3, 3),
      life: 255,
      hue,
      size: random(2, 8)
    });
  }

  function updateAndDrawParticles() {
    if (particles.length > MAX_PARTICLES) {
      particles.splice(0, particles.length - MAX_PARTICLES);
    }
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life -= 3;
      if (p.life <= 0) {
        particles.splice(i, 1);
        continue;
      }
      fill(p.hue, 50, 100, (p.life / 255) * 80);
      ellipse(p.x, p.y, p.size, p.size);
    }
  }
</script>
</body>
</html>
