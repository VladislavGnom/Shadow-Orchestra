<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Теневой оркестр — Визуализация</title>
<style>
  * { margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
  }
  canvas { display: block; }
</style>
</head>
<body>

<!-- CDN: Socket.IO (раздаётся сервером) -->
<script src="/socket.io/socket.io.js"></script>
<!-- CDN: p5.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

<script>
  // ═══════════════════════════════════════════════════
  // Цвета ролей (HUE в модели HSB)
  // ═══════════════════════════════════════════════════
  const ROLE_HUE = { bass: 0, pad: 180, lead: 50, arp: 260, fx: 330 };

  // ═══════════════════════════════════════════════════
  // Состояние, приходящее с сервера
  // ═══════════════════════════════════════════════════
  let instruments = {};   // { socketId: { role, note, velocity, lastUpdate } }
  let bpm = 120;
  let mode = 'ambient';

  // ═══════════════════════════════════════════════════
  // Локальное состояние визуализации
  // ═══════════════════════════════════════════════════
  let waveOffset = 0;
  let particles = [];
  const MAX_PARTICLES = 300;

  // ═══════════════════════════════════════════════════
  // Socket.IO
  // ═══════════════════════════════════════════════════
  const socket = io();

  socket.on('visualization-data', (data) => {
    instruments = data.instruments || {};
    bpm = data.bpm || bpm;
    mode = data.mode || mode;
  });

  // ═══════════════════════════════════════════════════
  // p5.js — базовая сцена
  // ═══════════════════════════════════════════════════
  function setup() {
    createCanvas(windowWidth, windowHeight);
    colorMode(HSB, 360, 100, 100, 100);
    noStroke();
  }

  function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
  }

  function draw() {
    // Длинный хвост затухания вместо полной очистки
    background(0, 0, 0, 15);

    // waveOffset вращается тем быстрее, чем выше BPM
    waveOffset += 0.01 * (bpm / 120);

    const playerIds = Object.keys(instruments);

    // Режим chaos: дрожание всей сцены
    const isChaos = mode === 'chaos';
    if (isChaos) {
      push();
      translate(random(-10, 10), random(-10, 10));
    }

    drawMetronome();

    if (playerIds.length === 0) {
      drawIdleState();
    } else {
      drawOrbits(playerIds);
    }

    updateAndDrawParticles();

    if (isChaos) {
      pop();
    }
  }

  // ═══════════════════════════════════════════════════
  // Пульсирующий круг-метроном в центре
  // ═══════════════════════════════════════════════════
  function drawMetronome() {
    const beatPhase = (frameCount * (bpm / 60) / 60); // доля бита за кадр (60 fps допущение)
    const pulse = sin(beatPhase * TWO_PI);
    const size = 100 + pulse * 50;

    fill(0, 0, 100, 10);
    ellipse(width / 2, height / 2, size, size);
  }

  // ═══════════════════════════════════════════════════
  // Пустой оркестр — система жива и ждёт
  // ═══════════════════════════════════════════════════
  function drawIdleState() {
    const pulse = sin(frameCount * 0.03);
    const size = 30 + pulse * 15;
    fill(0, 0, 100, 5 + abs(pulse) * 5);
    ellipse(width / 2, height / 2, size, size);
  }

  // ═══════════════════════════════════════════════════
  // Орбиты игроков
  // ═══════════════════════════════════════════════════
  function drawOrbits(playerIds) {
    const total = playerIds.length;
    const orbitRadius = min(width, height) * 0.3;

    playerIds.forEach((id, index) => {
      const player = instruments[id];
      if (!player || player.note === null) return; // нет ноты — не рисуем

      const angle = (index / total) * TWO_PI + waveOffset;
      const x = width / 2 + cos(angle) * orbitRadius;
      const y = height / 2 + sin(angle) * orbitRadius;

      drawPlayerDot(x, y, player);

      if (player.velocity > 0.3 && frameCount % 3 === 0) {
        spawnParticle(x, y, player.role);
      }

      if (player.velocity > 0.5) {
        drawRings(x, y, player.role);
      }
    });
  }

  // ═══════════════════════════════════════════════════
  // Точка игрока со свечением
  // ═══════════════════════════════════════════════════
  function drawPlayerDot(x, y, player) {
    const hue = ROLE_HUE[player.role] ?? 0;
    const size = 20 + player.velocity * 80;

    // Свечение: 3 слоя, каждый больше и прозрачнее
    fill(hue, 60, 100, 8);
    ellipse(x, y, size * 2, size * 2);

    fill(hue, 60, 100, 6);
    ellipse(x, y, size * 3, size * 3);

    fill(hue, 60, 100, 5);
    ellipse(x, y, size * 4, size * 4);

    // Ядро
    fill(hue, 60, 100, 80);
    ellipse(x, y, size, size);
  }

  // ═══════════════════════════════════════════════════
  // Круговые волны при высокой velocity
  // ═══════════════════════════════════════════════════
  function drawRings(x, y, role) {
    const hue = ROLE_HUE[role] ?? 0;

    noFill();
    strokeWeight(1);
    for (let ringIndex = 0; ringIndex < 3; ringIndex++) {
      const radius = 30 + ringIndex * 30 + sin(frameCount * 0.1 + ringIndex) * 20;
      stroke(hue, 60, 80, 30 - ringIndex * 10);
      ellipse(x, y, radius * 2, radius * 2);
    }
    noStroke(); // возвращаем состояние по умолчанию
  }

  // ═══════════════════════════════════════════════════
  // Частицы
  // ═══════════════════════════════════════════════════
  function spawnParticle(x, y, role) {
    if (particles.length >= MAX_PARTICLES) return; // не создаём при переполнении

    particles.push({
      x: x,
      y: y,
      vx: random(-3, 3),
      vy: random(-3, 3),
      life: 255,
      hue: ROLE_HUE[role] ?? 0,
      size: random(2, 8)
    });
  }

  function updateAndDrawParticles() {
    // На всякий случай жёстко ограничиваем размер массива снизу по возрасту
    if (particles.length > MAX_PARTICLES) {
      particles.splice(0, particles.length - MAX_PARTICLES);
    }

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life -= 3;

      if (p.life <= 0) {
        particles.splice(i, 1);
        continue;
      }

      fill(p.hue, 50, 100, (p.life / 255) * 80);
      ellipse(p.x, p.y, p.size, p.size);
    }
  }
</script>
</body>
</html>
