<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Теневой оркестр — Пульт дирижёра</title>
<style>
  * {
    margin: 0; padding: 0; box-sizing: border-box;
    font-family: 'Courier New', monospace;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    width: 100%;
    height: 100vh;
    height: 100dvh;
    background: #111;
    color: #fff;
  }

  #panel {
    display: flex;
    flex-direction: column;
    gap: clamp(14px, 2vh, 20px);
    padding:
      calc(20px + env(safe-area-inset-top))
      calc(20px + env(safe-area-inset-right))
      calc(20px + env(safe-area-inset-bottom))
      calc(20px + env(safe-area-inset-left));
  }

  h1 {
    font-size: clamp(16px, 3.5vw, 20px);
    letter-spacing: 3px;
    text-align: center;
    opacity: 0.9;
  }

  #counter-block {
    background: #1a1a1a;
    border-radius: 10px;
    padding: clamp(14px, 3vh, 22px);
    text-align: center;
  }
  #counter-value {
    font-size: clamp(36px, 9vw, 52px);
    font-weight: bold;
    color: #555;
    transition: color 0.3s ease;
  }
  #counter-label {
    font-size: clamp(10px, 2.2vw, 12px);
    opacity: 0.7; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px;
  }

  .block {
    background: #1a1a1a;
    border-radius: 10px;
    padding: clamp(14px, 2.5vh, 18px);
    border-left: 3px solid #555;
  }
  .block-label {
    font-size: clamp(11px, 2.4vw, 13px);
    opacity: 0.7; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px;
  }

  #tempo-block { border-left-color: #4ecdc4; }
  #key-block   { border-left-color: #a29bfe; }
  #mode-block  { border-left-color: #ffe66d; }
  #playmode-block { border-left-color: #fd79a8; }
  #remix-block { border-left-color: #fd79a8; display: none; flex-direction: column; gap: 12px; }
  #show-block  { border-left-color: #555; }

  .tempo-row { display: flex; align-items: center; gap: 12px; }
  input[type="range"] {
    flex: 1;
    accent-color: #4ecdc4;
    cursor: pointer;
    height: 20px; /* высота "тач-зоны" ползунка, не только видимой полоски */
    touch-action: manipulation;
  }
  #bpm-value {
    min-width: 80px; text-align: right;
    font-size: clamp(13px, 2.6vw, 15px);
    white-space: nowrap;
  }

  .key-row { display: flex; gap: 10px; flex-wrap: wrap; }
  select, input[type="file"] {
    flex: 1;
    min-width: 120px;
    background: #111; color: #fff; border: 1px solid #333; border-radius: 6px;
    padding: clamp(10px, 1.8vh, 12px) 10px;
    font-family: 'Courier New', monospace; cursor: pointer;
    font-size: clamp(13px, 2.8vw, 15px);
    min-height: 44px;
    touch-action: manipulation;
  }

  .mode-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .mode-btn, .playmode-btn {
    flex: 1;
    min-width: 90px;
    min-height: 44px;
    padding: clamp(10px, 1.6vh, 12px) 6px;
    border-radius: 8px; border: 2px solid transparent;
    background: rgba(255, 255, 255, 0.05); color: #fff;
    font-family: 'Courier New', monospace;
    font-size: clamp(11px, 2.6vw, 13px);
    cursor: pointer; opacity: 0.55;
    transition: opacity 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    text-align: center;
    touch-action: manipulation;
  }
  .mode-btn:hover, .playmode-btn:hover { opacity: 0.85; }
  .mode-btn.active, .playmode-btn.active { opacity: 1; border-color: currentColor; background: rgba(255, 255, 255, 0.1); }

  #mode-ambient { color: #a29bfe; }
  #mode-beat    { color: #4ecdc4; }
  #mode-chaos   { color: #ff6b6b; }
  #playmode-synth { color: #4ecdc4; }
  #playmode-remix { color: #fd79a8; }

  #load-track-btn {
    width: 100%;
    min-height: 44px;
    padding: clamp(10px, 1.8vh, 13px);
    background: #333; color: #fff; border: none; border-radius: 6px;
    font-family: 'Courier New', monospace;
    font-size: clamp(13px, 2.8vw, 15px);
    letter-spacing: 1px; cursor: pointer;
    touch-action: manipulation;
  }
  #load-track-btn:hover { background: #444; }
  #load-track-btn:disabled { opacity: 0.5; cursor: default; }

  #track-status { font-size: clamp(11px, 2.4vw, 13px); opacity: 0.75; min-height: 16px; }

  .transport-row { display: flex; gap: 8px; }
  .transport-row button {
    flex: 1;
    min-height: 44px;
    padding: clamp(10px, 1.6vh, 12px);
    background: rgba(255, 255, 255, 0.05); color: #fff;
    border: 1px solid #333; border-radius: 6px;
    font-family: 'Courier New', monospace;
    font-size: clamp(12px, 2.6vw, 14px);
    cursor: pointer;
    touch-action: manipulation;
  }
  .transport-row button:hover { background: rgba(255, 255, 255, 0.12); }

  #countdown-btn {
    width: 100%;
    min-height: 44px;
    padding: clamp(14px, 2.4vh, 18px);
    background: #333; color: #fff; border: none; border-radius: 8px;
    font-family: 'Courier New', monospace;
    font-size: clamp(13px, 2.8vw, 15px);
    letter-spacing: 2px; cursor: pointer;
    transition: background 0.2s ease;
    touch-action: manipulation;
  }
  #countdown-btn:hover:not(:disabled) { background: #444; }
  #countdown-btn:disabled { opacity: 0.5; cursor: default; }

  #countdown-overlay {
    position: fixed; inset: 0; display: none;
    align-items: center; justify-content: center; pointer-events: none; z-index: 999;
  }
  #countdown-overlay-value {
    font-size: clamp(80px, 25vw, 200px);
    font-weight: bold; color: #fff;
    text-shadow: 0 0 60px rgba(255, 255, 255, 0.6);
  }

  /* ── Телефон/планшет: карточки на всю ширину, вертикальный скролл ── */
  @media (max-width: 768px) {
    html, body { overflow-y: auto; overflow-x: hidden; }
    #panel { width: 100%; max-width: 100%; }
    .mode-row { flex-direction: column; }
    .mode-btn, .playmode-btn { width: 100%; }
  }

  /* ── Десктоп: узкая закреплённая колонка слева, без скролла страницы ── */
  @media (min-width: 769px) {
    html, body { overflow: hidden; }
    #panel {
      position: fixed;
      top: 0; left: 0;
      width: clamp(300px, 26vw, 350px);
      height: 100dvh;
      overflow-y: auto; /* подстраховка, если контент всё же не влезает по высоте */
    }
  }
</style>
</head>
<body>

  <div id="panel">
    <h1>🎭 ПУЛЬТ ДИРИЖЁРА</h1>

    <div id="counter-block">
      <div id="counter-value">0</div>
      <div id="counter-label">игроков подключено</div>
    </div>

    <div class="block" id="tempo-block">
      <div class="block-label">Темп</div>
      <div class="tempo-row">
        <input type="range" id="bpm-slider" min="40" max="200" value="120" step="1">
        <span id="bpm-value">120 BPM</span>
      </div>
    </div>

    <div class="block" id="key-block">
      <div class="block-label">Тональность</div>
      <div class="key-row">
        <select id="key-select">
          <option value="C" selected>C</option><option value="D">D</option><option value="E">E</option>
          <option value="F">F</option><option value="G">G</option><option value="A">A</option><option value="B">B</option>
        </select>
        <select id="scale-select">
          <option value="major">major</option>
          <option value="minor" selected>minor</option>
          <option value="pentatonic">pentatonic</option>
        </select>
      </div>
    </div>

    <div class="block" id="mode-block">
      <div class="block-label">Визуальный режим</div>
      <div class="mode-row">
        <button class="mode-btn active" id="mode-ambient" data-mode="ambient">🌊<br>Ambient</button>
        <button class="mode-btn" id="mode-beat" data-mode="beat">🥁<br>Beat</button>
        <button class="mode-btn" id="mode-chaos" data-mode="chaos">🔥<br>Chaos</button>
      </div>
    </div>

    <!-- Переключатель Синтезатор / Ремикс (поле playMode, НЕ mode) -->
    <div class="block" id="playmode-block">
      <div class="block-label">Режим исполнения</div>
      <div class="mode-row">
        <button class="playmode-btn active" id="playmode-synth" data-playmode="synth">🎹<br>Синтезатор</button>
        <button class="playmode-btn" id="playmode-remix" data-playmode="remix">🎧<br>Ремикс</button>
      </div>
    </div>

    <!-- Секция ремикса — видна только при playMode = remix -->
    <div class="block" id="remix-block">
      <div class="block-label">Трек</div>
      <input type="file" id="track-file" accept="audio/*">
      <select id="preloaded-tracks">
        <option value="">— выбрать из готовых —</option>
      </select>
      <button id="load-track-btn">Загрузить</button>
      <div id="track-status">Трек не загружен</div>
      <div class="transport-row">
        <button id="play-btn">▶ Play</button>
        <button id="pause-btn">⏸ Pause</button>
        <button id="stop-btn">⏹ Stop</button>
      </div>
    </div>

    <div class="block" id="show-block">
      <div class="block-label">Шоу</div>
      <button id="countdown-btn">⏱ ОБРАТНЫЙ ОТСЧЁТ</button>
    </div>
  </div>

  <div id="countdown-overlay">
    <div id="countdown-overlay-value"></div>
  </div>

  <!-- CDN -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

  <script>
    const socket = io();

    socket.on('connect', () => {
      socket.emit('register', { type: 'conductor' });
    });

    socket.on('orchestra-update', (data) => {
      const value = data.activePlayers ?? 0;
      const counterEl = document.getElementById('counter-value');
      counterEl.textContent = value;
      counterEl.style.color = value > 0 ? '#4ecdc4' : '#555';
    });

    socket.on('track-load-error', ({ message }) => {
      console.error('[track-load-error]', message);
      clearTrackLoadTimeout();
      trackStatusEl.textContent = message;
      loadTrackBtn.disabled = false;
    });

    const bpmSlider = document.getElementById('bpm-slider');
    const bpmValueEl = document.getElementById('bpm-value');
    bpmSlider.addEventListener('input', () => {
      const bpm = Number(bpmSlider.value);
      bpmValueEl.textContent = `${bpm} BPM`;
      socket.emit('conductor-command', { bpm });
    });

    const keySelect = document.getElementById('key-select');
    const scaleSelect = document.getElementById('scale-select');
    keySelect.addEventListener('change', () => socket.emit('conductor-command', { key: keySelect.value }));
    scaleSelect.addEventListener('change', () => socket.emit('conductor-command', { scale: scaleSelect.value }));

    const modeButtons = document.querySelectorAll('.mode-btn');
    modeButtons.forEach((btn) => {
      btn.addEventListener('click', () => {
        modeButtons.forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        socket.emit('conductor-command', { mode: btn.dataset.mode });
      });
    });

    const playmodeButtons = document.querySelectorAll('.playmode-btn');
    const remixBlock = document.getElementById('remix-block');

    playmodeButtons.forEach((btn) => {
      btn.addEventListener('click', () => {
        playmodeButtons.forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');

        const playMode = btn.dataset.playmode;
        remixBlock.style.display = playMode === 'remix' ? 'flex' : 'none';

        socket.emit('conductor-command', { playMode });

        if (playMode === 'synth' && typeof Tone !== 'undefined' && Tone.Transport.state === 'started') {
          Tone.Transport.pause();
          trackStatusEl.textContent = 'Приостановлено (переключились в Синтезатор)';
        }
      });
    });

    const trackFileInput = document.getElementById('track-file');
    const preloadedSelect = document.getElementById('preloaded-tracks');
    const loadTrackBtn = document.getElementById('load-track-btn');
    const trackStatusEl = document.getElementById('track-status');
    const playBtn = document.getElementById('play-btn');
    const pauseBtn = document.getElementById('pause-btn');
    const stopBtn = document.getElementById('stop-btn');

    fetch('/api/tracks')
      .then((r) => r.json())
      .then((data) => {
        const tracks = data.tracks || [];
        console.log('[tracks] найдено на сервере:', tracks);

        if (tracks.length === 0) {
          // Раньше список просто оставался пустым без объяснений — теперь видно причину
          const opt = document.createElement('option');
          opt.value = '';
          opt.textContent = '(папка public/tracks/ пуста)';
          opt.disabled = true;
          preloadedSelect.appendChild(opt);
          trackStatusEl.textContent = 'В public/tracks/ нет файлов — загрузите трек вручную (файлом)';
          return;
        }

        tracks.forEach((name) => {
          const opt = document.createElement('option');
          opt.value = name;
          opt.textContent = name;
          preloadedSelect.appendChild(opt);
        });
      })
      .catch((err) => {
        console.error('[tracks] не удалось получить список:', err);
        trackStatusEl.textContent = 'Не удалось получить список треков с сервера';
      });

    // Таймер ожидания ответа на load-preloaded-track — если сервер по какой-то
    // причине не пришлёт ни 'track-loaded', ни 'track-load-error' (например,
    // сокет-эвент потерялся), UI раньше молча зависал на "Загружаю...".
    let trackLoadTimeoutId = null;

    function clearTrackLoadTimeout() {
      if (trackLoadTimeoutId) {
        clearTimeout(trackLoadTimeoutId);
        trackLoadTimeoutId = null;
      }
    }

    loadTrackBtn.addEventListener('click', async () => {
      console.log('[load-track] клик по кнопке "Загрузить"');
      loadTrackBtn.disabled = true;

      try {
        await Tone.start();
        console.log('[load-track] Tone.start() выполнен, state:', Tone.context.state);

        if (trackFileInput.files[0]) {
          const file = trackFileInput.files[0];
          console.log('[load-track] выбран файл для загрузки:', file.name, file.size, 'байт');

          const formData = new FormData();
          formData.append('track', file);
          trackStatusEl.textContent = 'Загружаю файл...';

          const res = await fetch('/upload-track', { method: 'POST', body: formData });
          const data = await res.json();
          console.log('[load-track] ответ /upload-track:', data);
          if (!data.ok) throw new Error(data.error || 'Ошибка загрузки');
          // Дальше событие 'track-loaded' придёт по сокету и поднимет плеер —
          // кнопку разблокируем в его обработчике (см. ниже)

        } else if (preloadedSelect.value) {
          console.log('[load-track] выбран предзагруженный трек:', preloadedSelect.value);
          trackStatusEl.textContent = 'Загружаю: ' + preloadedSelect.value;

          clearTrackLoadTimeout();
          trackLoadTimeoutId = setTimeout(() => {
            console.warn('[load-track] нет ответа от сервера за 8 секунд — таймаут');
            trackStatusEl.textContent = 'Сервер не ответил за 8 секунд. Проверь консоль сервера — возможно, файл не найден в public/tracks/.';
            loadTrackBtn.disabled = false;
          }, 8000);

          socket.emit('load-preloaded-track', { filename: preloadedSelect.value });
          // Кнопку разблокируем в обработчике 'track-loaded'/'track-load-error' ниже

        } else {
          alert('Выберите файл или трек из списка');
          loadTrackBtn.disabled = false;
        }
      } catch (err) {
        console.error('[load-track] ошибка:', err);
        trackStatusEl.textContent = 'Ошибка: ' + err.message;
        loadTrackBtn.disabled = false;
      }
    });

    let hostPlayer = null;
    let hostChain = null;
    let analyser = null;
    let spectrumInterval = null;

    function disposeHostAudio() {
      if (spectrumInterval) { clearInterval(spectrumInterval); spectrumInterval = null; }
      Tone.Transport.stop();
      Tone.Transport.cancel();
      if (hostPlayer) { hostPlayer.dispose(); hostPlayer = null; }
      if (hostChain) {
        Object.values(hostChain).forEach((node) => { if (node && node.dispose) node.dispose(); });
        hostChain = null;
      }
      if (analyser) { analyser.dispose(); analyser = null; }
    }

    function buildEffectChain() {
      const pitch = new Tone.PitchShift({ pitch: 0 });
      const distortion = new Tone.Distortion({ distortion: 0 });
      const delay = new Tone.FeedbackDelay({ delayTime: 0.25, feedback: 0 });
      const reverb = new Tone.Freeverb({ roomSize: 0.3, dampening: 3000 });
      const filter = new Tone.Filter({ frequency: 8000, type: 'lowpass' });

      pitch.connect(distortion);
      distortion.connect(delay);
      delay.connect(reverb);
      reverb.connect(filter);
      filter.toDestination();

      return { pitch, distortion, delay, reverb, filter, input: pitch };
    }

    socket.on('track-loaded', ({ name, url }) => {
      console.log('[track-loaded] получено с сервера:', name, url);
      clearTrackLoadTimeout();
      trackStatusEl.textContent = 'Загружаю трек: ' + name;

      try {
        disposeHostAudio();
        hostChain = buildEffectChain();
        console.log('[track-loaded] цепочка эффектов создана, гружу аудио по URL:', url);

        hostPlayer = new Tone.Player({
          url,
          onload: () => {
            console.log('[track-loaded] Tone.Player загрузил буфер, запускаю воспроизведение');
            document.getElementById('track-status').textContent = 'Играет: ' + name;
            hostPlayer.sync().start(0);
            Tone.Transport.start();

            analyser = new Tone.Analyser('fft', 32);
            hostChain.filter.connect(analyser);

            spectrumInterval = setInterval(() => {
              if (!analyser) return;
              const values = analyser.getValue();
              const bins = Array.from(values).map((v) => Math.max(0, Math.min(255, Math.round((v + 100) * 2.55))));
              socket.emit('spectrum-data', { bins });
            }, 100);

            loadTrackBtn.disabled = false;
          },
          onerror: (err) => {
            console.error('[track-loaded] Tone.Player не смог загрузить файл:', err);
            trackStatusEl.textContent = 'Ошибка загрузки трека (проверь, что файл ' + url + ' доступен): ' + err;
            loadTrackBtn.disabled = false;
          }
        }).connect(hostChain.input);
      } catch (err) {
        console.error('[track-loaded] исключение при создании плеера/цепочки:', err);
        trackStatusEl.textContent = 'Ошибка инициализации плеера: ' + err.message;
        loadTrackBtn.disabled = false;
      }
    });

    socket.on('effect-change', ({ role, value }) => {
      if (!hostChain) {
        // Это ожидаемо ДО того, как загружен трек — но если это печатается
        // постоянно, пока трек уже вроде бы играет, значит track-loaded
        // не долетел до этой вкладки, либо hostChain был случайно обнулён.
        console.warn('[effect-change] пришло от телефона, но hostChain ещё не создан (трек не загружен) — игнорирую:', role, value);
        return;
      }
      switch (role) {
        case 'filter':
          hostChain.filter.frequency.rampTo(value, 0.05);
          break;
        case 'reverb':
          hostChain.reverb.roomSize.rampTo(value, 0.05);
          break;
        case 'delay':
          hostChain.delay.feedback.rampTo(value, 0.05);
          break;
        case 'pitch':
          hostChain.pitch.pitch = value;
          break;
        case 'distortion':
          hostChain.distortion.distortion = value;
          break;
      }
    });

    playBtn.addEventListener('click', async () => {
      await Tone.start();
      if (hostPlayer) {
        Tone.Transport.start();
        trackStatusEl.textContent = 'Играет';
      }
    });
    pauseBtn.addEventListener('click', () => {
      if (hostPlayer) {
        Tone.Transport.pause();
        trackStatusEl.textContent = 'Пауза';
      }
    });
    stopBtn.addEventListener('click', () => {
      if (hostPlayer) {
        Tone.Transport.stop();
        trackStatusEl.textContent = 'Остановлено';
      }
    });

    const countdownBtn = document.getElementById('countdown-btn');
    const countdownOverlay = document.getElementById('countdown-overlay');
    const countdownOverlayValue = document.getElementById('countdown-overlay-value');

    function sleep(ms) { return new Promise((resolve) => setTimeout(resolve, ms)); }

    async function runCountdown() {
      countdownBtn.disabled = true;
      const sequence = ['5', '4', '3', '2', '1', '🎵'];
      countdownOverlay.style.display = 'flex';
      for (const value of sequence) {
        console.log(value);
        countdownOverlayValue.textContent = value;
        await sleep(1000);
      }
      countdownOverlay.style.display = 'none';
      countdownBtn.disabled = false;
    }

    countdownBtn.addEventListener('click', runCountdown);
  </script>
</body>
</html>
